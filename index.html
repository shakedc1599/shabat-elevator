<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מעלית שבת</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#060606">
</head>

<body>
    <div id="inactive-overlay">
        <p>מעלית שבת - במנוחה</p>
    </div>

    <div class="controls-top">
        <button id="btn-sync">סנכרון</button>
        <button id="btn-settings">⚙️</button>
        <button id="btn-fullscreen">⛶</button>
    </div>

    <main class="burn-in-shield">
        <div id="floor-display">--</div>
        <div id="direction-indicator">---</div>
    </main>

    <div class="timer-container burn-in-shield">
        <div class="timer-label">זמן הגעה לקומה <span id="target-floor-label">0</span>:</div>
        <div id="target-timer">--:--</div>
        <div id="timer-note" style="font-size: 2.5vmin; color: var(--text-dim); margin-top: 0.5vh;"></div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>

</html>
